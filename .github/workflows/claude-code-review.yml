name: Claude Code Review

# This workflow performs automated code review using Claude Code when a PR is ready for review.
#
# How it works:
# 1. Triggers when a PR is marked "Ready for review" (or opened/updated)
# 2. Claude analyzes the code and posts inline comments for specific issues
# 3. Claude posts a summary comment with overall feedback
# 4. Claude submits a formal GitHub review:
#    - REQUEST CHANGES (❌) if critical issues found → blocks merge
#    - APPROVE (✅) if code quality is good → allows merge
# 5. When new commits are pushed, Claude automatically re-reviews:
#    - Checks if previous issues were properly fixed
#    - Auto-resolves comment threads where issues are verified as fixed
#    - Keeps unresolved comments where issues persist
#    - Posts new comments for any new issues found
#    - Updates formal review based on current state
#
# Required Branch Protection Setup (configure in GitHub repository settings):
# 1. Go to Settings → Branches → Add branch protection rule for your main branch
# 2. Enable "Require approvals" (set to 1 or more for human review)
# 3. Enable "Dismiss stale reviews when new commits are pushed"
#    - This ensures Claude re-reviews after changes
# 4. Enable "Require conversation resolution before merging"
#    - This ensures all Claude's comments are either fixed (and auto-resolved) or addressed
# 5. Optional: Add a CODEOWNERS file to specify required human reviewers
#
# This ensures:
# - Claude reviews first and blocks merge if issues found
# - Developers address Claude's feedback and push updates
# - Claude verifies fixes and auto-resolves resolved issues
# - Human reviewers can see which issues were fixed and verified by Claude
# - PR can only merge when: all conversations resolved + Claude approves + human approves

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]
    paths-ignore:
      - '.github/workflows/**'
      - 'doc/**'
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: '!github.event.pull_request.draft'
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read  # Required for github_ci MCP server to read CI results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load code review guidelines
        id: code-review-guidelines
        run: |
          if [ ! -f ".claude/prompts/code-review-guidelines.md" ]; then
            echo "ERROR: .claude/prompts/code-review-guidelines.md not found!"
            echo "This file is required for code reviews to function correctly."
            exit 1
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat .claude/prompts/code-review-guidelines.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            ${{ steps.code-review-guidelines.outputs.content }}

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are coordinating a comprehensive multi-language code review for this PR.

            **Step 1: Analyze Changed Files**
            Use `gh pr diff --name-only ${{ github.event.pull_request.number }}` to get the list of changed files.

            **Step 2: Launch Specialized Subagents in Parallel**
            Based on file extensions, launch appropriate subagents:

            **For C++/C files** (.cpp, .h, .c, .hpp, .cc, .cxx, .hxx):
            Launch cpp-pro subagent with this prompt:
            ```
            First, read the file .claude/prompts/code-review-guidelines.md for critical review guidelines and follow them strictly.

            You are reviewing C++ code changes in PR #${{ github.event.pull_request.number }} for repository ${{ github.repository }}.

            Focus on C++ files only (.cpp, .h, .c, .hpp, .cc, .cxx, .hxx).

            **STEP 0: Deduplication Setup (Prevent Duplicate Comments)**

            BEFORE reviewing any code, build a comment cache to avoid posting duplicates:

            1. Fetch existing Claude comments (one API call):
               gh api /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
                 --jq '[.[] | select(.user.login == "claude[bot]") | {path, line, body: .body[0:200]}]'

            2. Build in-memory lookup of existing comments:
               - Create a map of file:line → comment summary
               - Example: "src/script/shiftnum.cpp:124" → "Potential Integer Overflow..."
               - For file-level comments (no line), use "filepath:null"

            3. Before posting EACH inline comment via mcp__github_inline_comment__create_inline_comment:
               - Check cache: Does this file:line already have a comment?
               - If YES and describes SAME issue → SKIP (avoid duplicate)
               - If YES and describes DIFFERENT issue → POST (different problem, same location)
               - If NO → POST (new issue)

            4. Similarity check for "same issue":
               - Extract key terms from both issue descriptions
               - If 60%+ overlap in key technical terms → Consider same issue
               - Examples:
                 * "Missing null check" vs "Critical: Missing null check" → SAME (skip)
                 * "Memory leak" vs "Race condition" → DIFFERENT (post both)

            **Review Focus:**
            1. **Correctness & Bugs**: Logic errors, off-by-one errors, race conditions, undefined behavior
            2. **Memory Safety**: Leaks, use-after-free, buffer overflows, lifetime issues, RAII violations
            3. **Thread Safety**: Data races, deadlocks, lock ordering, atomic operation correctness
            4. **Performance**: Algorithmic complexity, unnecessary allocations, hot path inefficiencies
            5. **Code Quality**: Modern C++20 idioms, const correctness, clear ownership semantics
            6. **Security**: Input validation, DoS vectors, integer overflows

            Use `gh pr diff ${{ github.event.pull_request.number }}` to see the changes.
            Use `mcp__github_inline_comment__create_inline_comment` to post specific issues.

            Return a detailed report of all issues found, organized by severity (critical, major, minor).
            ```

            **For Python files** (.py):
            Launch general-purpose subagent with this prompt:
            ```
            First, read the file .claude/prompts/code-review-guidelines.md for critical review guidelines and follow them strictly.

            You are reviewing Python code changes in PR #${{ github.event.pull_request.number }} for repository ${{ github.repository }}.

            Focus on Python files only (.py). These are primarily test scripts for the C++ codebase.

            **STEP 0: Deduplication Setup (Prevent Duplicate Comments)**

            BEFORE reviewing any code, build a comment cache to avoid posting duplicates:

            1. Fetch existing Claude comments (one API call):
               gh api /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
                 --jq '[.[] | select(.user.login == "claude[bot]") | {path, line, body: .body[0:200]}]'

            2. Build in-memory lookup of existing comments:
               - Create a map of file:line → comment summary
               - Example: "test/functional/bsv-op-lshift.py:145" → "Missing edge case test..."
               - For file-level comments (no line), use "filepath:null"

            3. Before posting EACH inline comment via mcp__github_inline_comment__create_inline_comment:
               - Check cache: Does this file:line already have a comment?
               - If YES and describes SAME issue → SKIP (avoid duplicate)
               - If YES and describes DIFFERENT issue → POST (different problem, same location)
               - If NO → POST (new issue)

            4. Similarity check for "same issue":
               - Extract key terms from both issue descriptions
               - If 60%+ overlap in key technical terms → Consider same issue
               - Examples:
                 * "Missing edge case test" vs "Critical: Missing edge case test" → SAME (skip)
                 * "Missing edge case test" vs "Incorrect assertion" → DIFFERENT (post both)

            **Review Focus:**
            1. **Test Coverage**: Are edge cases tested? Are assertions clear and comprehensive?
            2. **Test Structure**: Is test organization logical? Are tests independent?
            3. **Python Best Practices**: PEP8 compliance, proper error handling, clear naming
            4. **Performance**: Are tests efficient? Any unnecessarily slow operations?
            5. **Correctness**: Logic errors, off-by-one errors in test ranges, improper assertions

            Use `gh pr diff ${{ github.event.pull_request.number }}` to see the changes.
            Use `mcp__github_inline_comment__create_inline_comment` to post specific issues.

            Return a detailed report of all issues found, organized by severity (critical, major, minor).
            ```

            **Step 3: Combine Feedback and Submit Review**
            Once all subagents complete:
            1. Collect all issues from both subagents
            2. All inline comments should already be posted by the subagents (with deduplication)
            3. Return your unified summary in your final response covering:
               - C++ review summary (if applicable)
               - Python review summary (if applicable)
               - Overall assessment
               - Any positive aspects worth noting
               (The sticky_comment mechanism will automatically post/update this - DO NOT use gh pr comment)
            4. Determine enforcement decision using ABSOLUTE ZERO-TOLERANCE POLICY:

               a. Get review thread resolution status:
                  gh api graphql -f query='{ repository(owner: "${{ github.event.pull_request.head.repo.owner.login }}", name: "${{ github.event.pull_request.head.repo.name }}") { pullRequest(number: ${{ github.event.pull_request.number }}) { reviewThreads(first: 100) { nodes { isResolved resolvedBy { login } comments(first: 1) { nodes { author { login } } } } } } } }'

               b. Count UNRESOLVED Claude threads (excluding CODEOWNER-resolved):
                  - For each reviewThread where author is "claude[bot]":
                    * If isResolved == false → Count as blocking
                    * If isResolved == true AND resolvedBy is in @teranode-group/svn-global-owners → Don't count (CODEOWNER override)
                    * If isResolved == true AND resolvedBy is NOT CODEOWNER → Don't count (issue was fixed)

               c. Check CODEOWNERS membership dynamically:
                  gh api orgs/teranode-group/teams/svn-global-owners/members --jq '.[].login'
                  (Query returns current team members from GitHub API)

               d. Make enforcement decision:
                  unresolved_count = (number of unresolved Claude threads not dismissed by CODEOWNERS)

                  If unresolved_count > 0:
                    gh pr review ${{ github.event.pull_request.number }} --request-changes \
                      --body "Absolute Zero-Tolerance: {unresolved_count} unresolved issue(s) block merge. All comments must be addressed or resolved by CODEOWNERS."
                  Else:
                    gh pr review ${{ github.event.pull_request.number }} --approve \
                      --body "All issues resolved. Code review passed."

            **For Re-Reviews (when reviewing updated code):**
            1. Get resolution status of all previous threads:
               - Use GraphQL to fetch reviewThreads with isResolved and resolvedBy
               - Use REST API to get inline comment details

            2. Launch the same subagents with deduplication enabled:
               - Subagents will check existing comments and NOT re-post duplicates
               - Subagents will identify which issues are fixed vs. still present

            3. For each previous issue thread:
               - If resolvedBy is CODEOWNER → DO NOT re-post comment (respect dismissal)
               - If issue was fixed by developer → Resolve thread:
                 gh api --method PATCH /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments/{comment_id} -f state=resolved
               - If issue still persists → Leave unresolved (already has comment from deduplication)

            4. Apply absolute zero-tolerance enforcement (Step 3.4 above)
               - Count only unresolved threads (excluding CODEOWNER dismissals)
               - Block merge if any unresolved issues remain

            Use the repository's CLAUDE.md for guidance. Be thorough, constructive, and coordinate effectively between subagents.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          claude_args: '--allowed-tools "Task,mcp__github_inline_comment__create_inline_comment,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh api:*)"'

