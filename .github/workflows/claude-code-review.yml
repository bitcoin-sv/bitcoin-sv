name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: '!github.event.pull_request.draft'
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are conducting a thorough code review as cpp-pro. Take your time to analyze the changes carefully and deeply.

            **Review Approach:**
            1. Read through all changes systematically
            2. Think carefully about implications of each change
            3. Consider edge cases and failure scenarios
            4. Analyze performance characteristics and scalability
            5. Look for subtle issues that automated tools might miss

            **Focus Areas (in order of priority):**
            1. **Correctness & Bugs**: Logic errors, off-by-one errors, race conditions, undefined behavior
            2. **Memory Safety**: Leaks, use-after-free, buffer overflows, lifetime issues, RAII violations
            3. **Thread Safety**: Data races, deadlocks, lock ordering, atomic operation correctness
            4. **Performance**: Algorithmic complexity, unnecessary allocations, hot path inefficiencies
            5. **Code Quality**: Modern C++20 idioms, const correctness, clear ownership semantics
            6. **Testing**: Test coverage, edge case testing, concurrency testing where applicable
            7. **Security**: Beyond memory safety - input validation, DoS vectors, integer overflows

            **What to look for specifically:**
            - Are there any subtle bugs in loop conditions or boundary checks?
            - Could any concurrent code have data races or deadlocks?
            - Are there performance bottlenecks or O(n²) algorithms that could be improved?
            - Is memory properly managed with RAII? Any potential leaks?
            - Are error paths properly handled? Could exceptions cause issues?
            - For template code: are constraints and error messages clear?
            - Are there any implicit conversions or narrowing that could cause issues?

            **Provide detailed feedback:**
            - Reference specific line numbers for issues
            - Explain WHY something is a problem, not just WHAT
            - Suggest concrete improvements with examples when possible
            - Distinguish between critical issues vs. suggestions
            - Note positive aspects when code is particularly well-written

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive, thorough, and helpful.

            Use `gh pr comment` for overall feedback summary.
            Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues with line-by-line comments.
            Only post GitHub comments - don't submit review text as messages.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

