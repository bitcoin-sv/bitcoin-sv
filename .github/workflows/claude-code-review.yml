name: Claude Code Review

# This workflow performs automated code review using Claude Code when a PR is ready for review.
#
# How it works:
# 1. Triggers when a PR is marked "Ready for review" (or opened/updated)
# 2. Claude analyzes the code and posts inline comments for specific issues
# 3. Claude posts a summary comment with overall feedback
# 4. Claude submits a formal GitHub review:
#    - REQUEST CHANGES (❌) if critical issues found → blocks merge
#    - APPROVE (✅) if code quality is good → allows merge
# 5. When new commits are pushed, Claude automatically re-reviews:
#    - Checks if previous issues were properly fixed
#    - Auto-resolves comment threads where issues are verified as fixed
#    - Keeps unresolved comments where issues persist
#    - Posts new comments for any new issues found
#    - Updates formal review based on current state
#
# Required Branch Protection Setup (configure in GitHub repository settings):
# 1. Go to Settings → Branches → Add branch protection rule for your main branch
# 2. Enable "Require approvals" (set to 1 or more for human review)
# 3. Enable "Dismiss stale reviews when new commits are pushed"
#    - This ensures Claude re-reviews after changes
# 4. Enable "Require conversation resolution before merging"
#    - This ensures all Claude's comments are either fixed (and auto-resolved) or addressed
# 5. Optional: Add a CODEOWNERS file to specify required human reviewers
#
# This ensures:
# - Claude reviews first and blocks merge if issues found
# - Developers address Claude's feedback and push updates
# - Claude verifies fixes and auto-resolves resolved issues
# - Human reviewers can see which issues were fixed and verified by Claude
# - PR can only merge when: all conversations resolved + Claude approves + human approves

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: '!github.event.pull_request.draft'
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are conducting a thorough code review as cpp-pro. Take your time to analyze the changes carefully and deeply.

            **Review Approach:**
            1. Read through all changes systematically
            2. Think carefully about implications of each change
            3. Consider edge cases and failure scenarios
            4. Analyze performance characteristics and scalability
            5. Look for subtle issues that automated tools might miss

            **Focus Areas (in order of priority):**
            1. **Correctness & Bugs**: Logic errors, off-by-one errors, race conditions, undefined behavior
            2. **Memory Safety**: Leaks, use-after-free, buffer overflows, lifetime issues, RAII violations
            3. **Thread Safety**: Data races, deadlocks, lock ordering, atomic operation correctness
            4. **Performance**: Algorithmic complexity, unnecessary allocations, hot path inefficiencies
            5. **Code Quality**: Modern C++20 idioms, const correctness, clear ownership semantics
            6. **Testing**: Test coverage, edge case testing, concurrency testing where applicable
            7. **Security**: Beyond memory safety - input validation, DoS vectors, integer overflows

            **What to look for specifically:**
            - Are there any subtle bugs in loop conditions or boundary checks?
            - Could any concurrent code have data races or deadlocks?
            - Are there performance bottlenecks or O(n²) algorithms that could be improved?
            - Is memory properly managed with RAII? Any potential leaks?
            - Are error paths properly handled? Could exceptions cause issues?
            - For template code: are constraints and error messages clear?
            - Are there any implicit conversions or narrowing that could cause issues?

            **Provide detailed feedback:**
            - Reference specific line numbers for issues
            - Explain WHY something is a problem, not just WHAT
            - Suggest concrete improvements with examples when possible
            - Distinguish between critical issues vs. suggestions

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive, thorough, and helpful.

            **How to provide feedback:**

            **For initial reviews:**
            1. Use `mcp__github_inline_comment__create_inline_comment` ONLY for issues, problems, or suggestions that need addressing
               - DO NOT create inline comments for positive feedback or compliments
            2. Post a summary comment with overall feedback (include any positive aspects here)
            3. **REQUIRED:** Submit a formal GitHub review using `gh pr review`:
               - If you found critical issues, blocking issues, or problems that must be fixed:
                 `gh pr review --request-changes --body "Brief summary of key issues that need addressing"`
               - If the code looks good with only minor suggestions or no issues:
                 `gh pr review --approve --body "LGTM - code quality is good" (or provide positive feedback)`

            **For review updates (when reviewing updated code after previous feedback):**
            1. First, use `gh pr view ${{ github.event.pull_request.number }} --json comments,reviewThreads` to see your previous comments
            2. For each previous issue you raised:
               - Verify if the code change properly addresses the concern
               - If properly fixed, resolve the comment thread using:
                 `gh api --method PATCH /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments/{comment_id} -f state=resolved`
               - If issue persists or fix is inadequate, keep it unresolved and optionally reply with clarification
            3. Check for any new issues introduced by the changes
            4. Post new inline comments ONLY for any new issues found (not for positive feedback)
            5. Update the summary comment with what was fixed, what remains, any new findings, and positive aspects
            6. Submit updated formal review (approve if all issues resolved, request-changes if problems remain)

            **Important guidelines for resolving comments:**
            - Only resolve when you verify the fix actually addresses the root cause
            - Don't resolve if the fix is incomplete or introduces new problems
            - Be thorough - this replaces human verification of fixes
            - In your summary comment, explain what you verified and resolved

            This formal review is crucial as it controls whether the PR can be merged. Only approve if the code quality meets standards.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh api:*)"'

