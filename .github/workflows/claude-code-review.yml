name: Claude Code Review

# This workflow performs automated code review using Claude Code when a PR is ready for review.
#
# How it works:
# 1. Triggers when a PR is marked "Ready for review" (or opened/updated)
# 2. Claude analyzes the code and posts inline comments for specific issues
# 3. Claude posts a summary comment with overall feedback
# 4. Claude submits a formal GitHub review:
#    - REQUEST CHANGES (❌) if critical issues found → blocks merge
#    - APPROVE (✅) if code quality is good → allows merge
# 5. When new commits are pushed, Claude automatically re-reviews:
#    - Checks if previous issues were properly fixed
#    - Auto-resolves comment threads where issues are verified as fixed
#    - Keeps unresolved comments where issues persist
#    - Posts new comments for any new issues found
#    - Updates formal review based on current state
#
# Required Branch Protection Setup (configure in GitHub repository settings):
# 1. Go to Settings → Branches → Add branch protection rule for your main branch
# 2. Enable "Require approvals" (set to 1 or more for human review)
# 3. Enable "Dismiss stale reviews when new commits are pushed"
#    - This ensures Claude re-reviews after changes
# 4. Enable "Require conversation resolution before merging"
#    - This ensures all Claude's comments are either fixed (and auto-resolved) or addressed
# 5. Optional: Add a CODEOWNERS file to specify required human reviewers
#
# This ensures:
# - Claude reviews first and blocks merge if issues found
# - Developers address Claude's feedback and push updates
# - Claude verifies fixes and auto-resolves resolved issues
# - Human reviewers can see which issues were fixed and verified by Claude
# - PR can only merge when: all conversations resolved + Claude approves + human approves

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]
    paths-ignore:
      - '.github/workflows/**'
      - 'doc/**'
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: '!github.event.pull_request.draft'
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are coordinating a comprehensive multi-language code review for this PR.

            **Step 1: Analyze Changed Files**
            Use `gh pr diff --name-only ${{ github.event.pull_request.number }}` to get the list of changed files.

            **Step 2: Launch Specialized Subagents in Parallel**
            Based on file extensions, launch appropriate subagents:

            **For C++/C files** (.cpp, .h, .c, .hpp, .cc, .cxx, .hxx):
            Launch cpp-pro subagent with this prompt:
            ```
            You are reviewing C++ code changes in PR #${{ github.event.pull_request.number }} for repository ${{ github.repository }}.

            Focus on C++ files only (.cpp, .h, .c, .hpp, .cc, .cxx, .hxx).

            **Review Focus:**
            1. **Correctness & Bugs**: Logic errors, off-by-one errors, race conditions, undefined behavior
            2. **Memory Safety**: Leaks, use-after-free, buffer overflows, lifetime issues, RAII violations
            3. **Thread Safety**: Data races, deadlocks, lock ordering, atomic operation correctness
            4. **Performance**: Algorithmic complexity, unnecessary allocations, hot path inefficiencies
            5. **Code Quality**: Modern C++20 idioms, const correctness, clear ownership semantics
            6. **Security**: Input validation, DoS vectors, integer overflows

            Use `gh pr diff ${{ github.event.pull_request.number }}` to see the changes.
            Use `mcp__github_inline_comment__create_inline_comment` to post specific issues.

            Return a detailed report of all issues found, organized by severity (critical, major, minor).
            ```

            **For Python files** (.py):
            Launch general-purpose subagent with this prompt:
            ```
            You are reviewing Python code changes in PR #${{ github.event.pull_request.number }} for repository ${{ github.repository }}.

            Focus on Python files only (.py). These are primarily test scripts for the C++ codebase.

            **Review Focus:**
            1. **Test Coverage**: Are edge cases tested? Are assertions clear and comprehensive?
            2. **Test Structure**: Is test organization logical? Are tests independent?
            3. **Python Best Practices**: PEP8 compliance, proper error handling, clear naming
            4. **Performance**: Are tests efficient? Any unnecessarily slow operations?
            5. **Correctness**: Logic errors, off-by-one errors in test ranges, improper assertions

            Use `gh pr diff ${{ github.event.pull_request.number }}` to see the changes.
            Use `mcp__github_inline_comment__create_inline_comment` to post specific issues.

            Return a detailed report of all issues found, organized by severity (critical, major, minor).
            ```

            **Step 3: Combine Feedback and Submit Review**
            Once all subagents complete:
            1. Collect all issues from both subagents
            2. All inline comments should already be posted by the subagents
            3. Create a unified summary comment using `gh pr comment` covering:
               - C++ review summary (if applicable)
               - Python review summary (if applicable)
               - Overall assessment
               - Any positive aspects worth noting
            4. Submit ONE formal review using `gh pr review`:
               - **Request changes** if ANY subagent found critical or major issues that must be fixed
               - **Approve** only if ALL subagents found no blocking issues
               - Include a brief summary in the review body

            **For Re-Reviews (when reviewing updated code):**
            1. First, use `gh pr view ${{ github.event.pull_request.number }} --json comments,reviewThreads` to see previous comments
            2. Launch the same subagents to verify fixes across all file types
            3. For each previous issue:
               - If properly fixed, resolve using: `gh api --method PATCH /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments/{comment_id} -f state=resolved`
               - If issue persists, keep unresolved
            4. Check for new issues
            5. Submit updated summary and formal review

            Use the repository's CLAUDE.md for guidance. Be thorough, constructive, and coordinate effectively between subagents.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          claude_args: '--allowed-tools "Task,mcp__github_inline_comment__create_inline_comment,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh api:*)"'

