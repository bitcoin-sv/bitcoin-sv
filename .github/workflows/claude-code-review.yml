name: Claude Code Review

# This workflow performs automated code review using Claude Code when a PR is ready for review.
#
# How it works:
# 1. Triggers when a PR is marked "Ready for review" (or opened/updated)
# 2. Claude analyzes the code and posts inline comments for specific issues
# 3. Claude posts a summary comment with overall feedback (updates in-place on re-reviews)
# 4. Enforcement script programmatically sets commit status check:
#    - FAILURE (❌) if any unresolved issues found → blocks merge
#    - SUCCESS (✅) if all issues resolved or dismissed by CODEOWNERS → allows merge
# 5. When new commits are pushed, Claude automatically re-reviews:
#    - Checks if previous issues were properly fixed
#    - Auto-resolves comment threads where issues are verified as fixed
#    - Un-resolves threads that were prematurely marked resolved (prevents bypass)
#    - Posts new comments for any new issues found
#    - Updates commit status check based on current state
#
# Required Branch Protection Setup (configure in GitHub repository settings):
# 1. Go to Settings → Branches → Add branch protection rule for your main branch
# 2. Enable "Require status checks to pass before merging"
#    - Add "Claude Code Review" to the list of required status checks
#    - This blocks merge if Claude finds any unresolved issues
# 3. Enable "Require conversation resolution before merging"
#    - This ensures all Claude's comments are either fixed (and auto-resolved)
#      or dismissed by CODEOWNERS
# 4. Enable "Require approvals" (set to 1 or more for human review)
# 5. Optional: Add a CODEOWNERS file to specify required human reviewers
#
# This ensures:
# - Claude reviews first and blocks merge if issues found (via status check)
# - Developers address Claude's feedback and push updates
# - Claude verifies fixes and auto-resolves verified issues
# - Human reviewers can see which issues were fixed and verified by Claude
# - PR can only merge when: status check passes + all conversations resolved + human approves

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]
    paths-ignore:
      - '.github/workflows/**'
      - 'doc/**'
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: '!github.event.pull_request.draft'
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read  # Required for github_ci MCP server to read CI results
      statuses: write
    
    timeout-minutes: 20 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load code review guidelines
        id: code-review-guidelines
        run: |
          if [ ! -f ".claude/prompts/code-review-guidelines.md" ]; then
            echo "ERROR: .claude/prompts/code-review-guidelines.md not found!"
            echo "This file is required for code reviews to function correctly."
            exit 1
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat .claude/prompts/code-review-guidelines.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            ${{ steps.code-review-guidelines.outputs.content }}

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            **ABSOLUTE ZERO-TOLERANCE ENFORCEMENT ACTIVE:**
            - Every issue found MUST be posted as an inline comment (except formatting issues)
            - All issues block merge equally (no severity distinctions for enforcement)
            - Only CODEOWNER dismissal or fixing the issue can unblock
            - Formatting tools handle:
              * C++ formatting → clang-format (skip these issues)
              * Python formatting → flake8 (skip these issues)
            - Everything else MUST be posted to ensure proper enforcement counting

            You are coordinating a comprehensive multi-language code review for this PR.

            ═══════════════════════════════════════════════════════════════════════
            **STEP 0 (CRITICAL): Determine Review Mode - Initial Review or Re-Review**
            ═══════════════════════════════════════════════════════════════════════

            ⚠️  MANDATORY FIRST STEP: Check if previous Claude review threads exist.

            Run this command to check for existing review threads:
            ```bash
            # Set variables from context (REPO and PR_NUMBER are provided above)
            REPO="${{ github.repository }}"
            PR_NUMBER=${{ github.event.pull_request.number }}

            # Extract owner and repo
            owner="${REPO%/*}"
            repo="${REPO#*/}"

            # Fetch existing review threads
            threads=$(gh api graphql -f query="
            query {
              repository(owner: \"$owner\", name: \"$repo\") {
                pullRequest(number: $PR_NUMBER) {
                  reviewThreads(first: 100) {
                    nodes {
                      id
                      isResolved
                      resolvedBy { login }
                      comments(first: 1) {
                        nodes {
                          id
                          author { login }
                          body
                          path
                          originalLine
                        }
                      }
                    }
                  }
                }
              }
            }" --jq \
            '[.data.repository.pullRequest.reviewThreads.nodes[] |
              select(.comments.nodes[0].author.login == "claude")]')

            echo "Found Claude review threads: $threads"
            ```

            **Decision Logic:**
            - IF `$threads` is `[]` or `null` → **INITIAL REVIEW MODE** (go to Section A below)
            - IF `$threads` contains threads → **RE-REVIEW MODE** (go to Section B below)

            ═══════════════════════════════════════════════════════════════════════
            **SECTION A: INITIAL REVIEW MODE (No Previous Threads Found)**
            ═══════════════════════════════════════════════════════════════════════

            **Step 1: Analyze Changed Files**
            Use `gh pr diff --name-only ${{ github.event.pull_request.number }}`
            to get the list of changed files.

            **Step 2: Launch Specialized Subagents in Parallel**
            Based on file extensions, launch appropriate subagents:

            **For C++/C files** (.cpp, .h, .c, .hpp, .cc, .cxx, .hxx):
            Launch cpp-pro subagent with this prompt:
            ```
            First, read the file .claude/prompts/code-review-guidelines.md for
            critical review guidelines and follow them strictly.

            You are reviewing C++ code changes in PR
            #${{ github.event.pull_request.number }} for repository
            ${{ github.repository }}.

            Focus on C++ files only (.cpp, .h, .c, .hpp, .cc, .cxx, .hxx).

            **STEP 0: MANDATORY Deduplication (CRITICAL - MUST NOT SKIP)**

            ⚠️  ABSOLUTE REQUIREMENT: You MUST fetch and check existing comments BEFORE reviewing.
            Posting duplicate comments is a critical failure. Follow these steps exactly:

            1. Fetch existing Claude comments (REQUIRED first step):
               gh api \
                 /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
                 --jq \
                 '[.[] | select(.user.login == "claude[bot]") |
                   {path, line, body: .body[0:200]}]'

            2. Build in-memory lookup map (file:line → comment):
               - Key format: "path:line" (e.g., "src/file.cpp:124")
               - For file-level comments (no line): "path:null"
               - Store first 200 chars of body for similarity check

            3. BEFORE EACH mcp__github_inline_comment__create_inline_comment call:
               - Check: Does map contain this file:line?
               - If NO → POST (new issue, proceed)
               - If YES → Compare issue descriptions:
                 * Extract key technical terms from both
                 * If 60%+ term overlap → SKIP (duplicate, DO NOT POST)
                 * If <60% overlap → POST (different issue, same location)

            4. Clarification on "Post ALL issues":
               - "ALL" means all NEW/UNIQUE issues, not duplicates
               - Zero-tolerance applies to unique issues only
               - Duplicates violate deduplication requirement

            Examples of SAME issue (SKIP):
            - "Missing null check" vs "Critical: Missing null check"
            - "Potential memory leak" vs "Memory leak in allocation"

            Examples of DIFFERENT issues (POST both):
            - "Memory leak" vs "Race condition" (different problems)
            - "Missing null check for ptr" vs "ptr never freed" (different issues)

            **Review Focus:**
            1. **Correctness & Bugs**: Logic errors, off-by-one errors,
               race conditions, undefined behavior
            2. **Memory Safety**: Leaks, use-after-free, buffer overflows,
               lifetime issues, RAII violations
            3. **Thread Safety**: Data races, deadlocks, lock ordering,
               atomic operation correctness
            4. **Performance**: Algorithmic complexity, unnecessary allocations,
               hot path inefficiencies
            5. **Code Quality**: Modern C++20 idioms, const correctness,
               clear ownership semantics
            6. **Security**: Input validation, DoS vectors, integer overflows

            Use `gh pr diff ${{ github.event.pull_request.number }}` to see the changes.

            **MANDATORY: Post ALL issues as inline comments for zero-tolerance enforcement**

            EXCEPTIONS - DO NOT comment on:
            - Code formatting issues that clang-format handles
              (indentation, spacing, braces, line length)
            - Any style issue that clang-format would automatically fix

            MUST POST as inline comments (using mcp__github_inline_comment__create_inline_comment):
            - ALL logic errors, bugs, potential crashes
            - ALL memory safety issues (leaks, buffer overflows, use-after-free)
            - ALL thread safety issues (race conditions, deadlocks)
            - ALL performance problems (algorithmic complexity, unnecessary allocations)
            - ALL missing error handling or edge cases
            - ALL unclear naming or missing documentation
            - ALL code quality issues (const correctness, RAII violations, missing noexcept)
            - Even "minor" suggestions like "consider using std::string_view" MUST be posted

            Zero-tolerance means EVERY non-formatting issue blocks merge until resolved.
            After posting all comments, return a summary report organized by severity.
            ```

            **For Python files** (.py):
            Launch general-purpose subagent with this prompt:
            ```
            First, read the file .claude/prompts/code-review-guidelines.md for
            critical review guidelines and follow them strictly.

            You are reviewing Python code changes in PR
            #${{ github.event.pull_request.number }} for repository
            ${{ github.repository }}.

            Focus on Python files only (.py). These are primarily test scripts for the C++ codebase.

            **STEP 0: MANDATORY Deduplication (CRITICAL - MUST NOT SKIP)**

            ⚠️  ABSOLUTE REQUIREMENT: You MUST fetch and check existing comments BEFORE reviewing.
            Posting duplicate comments is a critical failure. Follow these steps exactly:

            1. Fetch existing Claude comments (REQUIRED first step):
               gh api \
                 /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
                 --jq \
                 '[.[] | select(.user.login == "claude[bot]") |
                   {path, line, body: .body[0:200]}]'

            2. Build in-memory lookup map (file:line → comment):
               - Key format: "path:line" (e.g., "test/functional/test.py:145")
               - For file-level comments (no line): "path:null"
               - Store first 200 chars of body for similarity check

            3. BEFORE EACH mcp__github_inline_comment__create_inline_comment call:
               - Check: Does map contain this file:line?
               - If NO → POST (new issue, proceed)
               - If YES → Compare issue descriptions:
                 * Extract key technical terms from both
                 * If 60%+ term overlap → SKIP (duplicate, DO NOT POST)
                 * If <60% overlap → POST (different issue, same location)

            4. Clarification on "Post ALL issues":
               - "ALL" means all NEW/UNIQUE issues, not duplicates
               - Zero-tolerance applies to unique issues only
               - Duplicates violate deduplication requirement

            Examples of SAME issue (SKIP):
            - "Missing edge case test" vs "Critical: Missing edge case test"
            - "Incorrect assertion" vs "Assertion check incorrect"

            Examples of DIFFERENT issues (POST both):
            - "Missing edge case test" vs "Incorrect assertion"
            - "Missing test coverage" vs "Performance issue in loop"

            **Review Focus:**
            1. **Test Coverage**: Are edge cases tested? Are assertions clear and comprehensive?
            2. **Test Structure**: Is test organization logical? Are tests independent?
            3. **Python Best Practices**: PEP8 compliance, proper error handling, clear naming
            4. **Performance**: Are tests efficient? Any unnecessarily slow operations?
            5. **Correctness**: Logic errors, off-by-one errors in test ranges, improper assertions

            Use `gh pr diff ${{ github.event.pull_request.number }}` to see the changes.

            **MANDATORY: Post ALL issues as inline comments for zero-tolerance enforcement**

            EXCEPTIONS - DO NOT comment on:
            - Python formatting issues that flake8 handles
              (line length, whitespace, indentation)
            - PEP8 style violations that flake8 would catch
              (import order, spacing around operators)
            - Any formatting issue that flake8 would automatically flag

            MUST POST as inline comments (using mcp__github_inline_comment__create_inline_comment):
            - ALL test coverage gaps or missing assertions
            - ALL logic errors or incorrect test expectations
            - ALL performance issues in tests
            - ALL unclear test names or poor test structure
            - ALL missing edge case tests
            - ALL error handling issues
            - ALL maintainability problems (complex functions, unclear logic)
            - Even "minor" suggestions like "test could be more descriptive" MUST be posted

            Zero-tolerance means EVERY non-formatting issue blocks merge until resolved.
            After posting all comments, return a summary report organized by severity.
            ```

            **Step 3 (Initial Review): Combine Feedback and Submit Review**
            Once all subagents complete:
            1. Collect all issues from both subagents
            2. All inline comments should already be posted by the subagents (with deduplication)
            3. Return your unified summary in your final response covering:
               - C++ review summary (if applicable)
               - Python review summary (if applicable)
               - Overall assessment
               - Any positive aspects worth noting
               (The sticky_comment mechanism will automatically post/update this -
                DO NOT use gh pr comment)

            NOTE: Enforcement via commit status check happens automatically
            after your review completes. You do NOT need to set the commit
            status - the workflow handles this programmatically.

            ═══════════════════════════════════════════════════════════════════════
            **SECTION B: RE-REVIEW MODE (Previous Threads Found)**
            ═══════════════════════════════════════════════════════════════════════

            ⚠️  CRITICAL: This is a RE-REVIEW. Your task is to VERIFY
            previous issues, NOT do a fresh review.

            **Step 1 (Re-Review): Fetch All Previous Review Threads**

            You already fetched threads in STEP 0. Store them for reference:
            - For each thread, note: thread_id, comment_id, path, line,
              isResolved, resolvedBy, issue description

            **Step 2 (Re-Review): Verify Each Previous Issue**

            For EACH previous thread, you must determine if the issue was fixed or still persists.

            Launch verification subagents (cpp-pro or general-purpose based on
            file type) with this prompt template (fill in the PR NUMBER from
            above and the list of issues from the threads you fetched):
            ```
            VERIFICATION TASK for PR #${{ github.event.pull_request.number }}

            You are verifying whether previous code review issues were fixed.

            **Previous issues to verify:**
            [List each thread with: file:line, issue description from thread]

            **Your task:**
            1. Read the CURRENT code at each file:line location
            2. For EACH previous issue, determine:
               - FIXED: The code change addresses the issue
                 (e.g., null check added, memory leak fixed)
               - PERSISTS: The issue still exists in the current code
            3. Return a verification report in this format:
               ```
               Thread ID: <thread_id>
               Location: <path>:<line>
               Status: FIXED | PERSISTS
               Evidence: [Brief explanation of what you found in the code]
               ```

            **IMPORTANT:**
            - DO NOT post new inline comments
            - DO NOT re-post existing comments
            - ONLY analyze whether previous issues were addressed
            - Check for new issues on NEW lines and report separately
            ```

            **Step 3 (Re-Review): Resolve/Unresolve Threads Based on Verification**

            For each verified thread, take action:

            **If resolvedBy is a CODEOWNER (member of svn-global-owners):**
            - SKIP this thread (CODEOWNER dismissal is final)
            - Do not modify thread state

            **If issue status is FIXED (verified by subagent):**
            - Resolve the thread using GraphQL:
              ```bash
              gh api graphql -f query='mutation {
                resolveReviewThread(input: {threadId: "<thread_id>"}) {
                  thread { id }
                }
              }'
              ```
            - NO comment needed (resolution itself indicates Claude verified the fix)

            **If issue status is PERSISTS (verified by subagent):**

            REQUIRED OUTCOME:
            - Post a reply comment on the existing unresolved thread explaining:
              * What evidence shows the issue still exists
              * What specific changes are needed to fix it
              * If developer said "Done", explain why the fix is incomplete

            IMPLEMENTATION:
            - Reply to thread using: gh api POST /repos/.../comments/{comment_id}/replies
            - Get {comment_id} from thread.comments.nodes[0].id (first comment in thread)

            - After posting reply, check if thread is currently resolved:
              - If thread.isResolved == false → Good, keep as-is
              - If thread.isResolved == true → UN-RESOLVE it (developer bypassed):
                ```bash
                gh api graphql -f query='mutation {
                  unresolveReviewThread(input: {threadId: "<thread_id>"}) {
                    thread { id }
                  }
                }'
                ```
            - This prevents bypassing enforcement by clicking "Resolve" without fixing

            **Step 4 (Re-Review): Check for New Issues on New Lines**

            After verifying previous threads:
            - Scan the diff for any NEW lines that were NOT previously
              commented
            - If you find NEW issues on NEW lines (not near previous
              comments), post NEW inline comments
            - Use the same deduplication logic from Section A to avoid
              duplicates

            **Step 5 (Re-Review): Return Summary**

            Return a summary covering:
            - Total previous threads verified
            - How many were FIXED vs PERSISTS
            - Any new issues found on new lines
            - Overall re-review assessment

            (The sticky_comment mechanism will automatically post/update this -
             DO NOT use gh pr comment)

            NOTE: Enforcement via commit status check happens automatically
            after your review completes.

            ═══════════════════════════════════════════════════════════════════════

            Use the repository's CLAUDE.md for guidance. Be thorough,
            constructive, and coordinate effectively between subagents.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # For available options see:
          # https://docs.claude.com/en/docs/claude-code/cli-reference
          claude_args: >-
            --allowed-tools
            "Task,mcp__github_inline_comment__create_inline_comment,
            Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),
            Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),
            Bash(gh api /repos/*/pulls/*/comments:*),
            Bash(gh api POST /repos/*/pulls/*/comments/*:*),
            Bash(gh api graphql:*)"

      - name: Enforce Zero-Tolerance Policy
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: .github/workflows/claude-code-review-enforcement.sh

