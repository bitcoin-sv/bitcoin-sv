name: CI
run-name:

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - 'doc/**'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  python_checks:
    strategy:
      matrix:
        org_repo: [nchain/svn_dev]
        tag : [ubuntu_24.04]
    runs-on: arc-runner-svnode
    container:
      image: "${{ matrix.org_repo }}:${{ matrix.tag }}"
    timeout-minutes: 5 
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: ''
      - name: Check functional tests are executable
        run: |
          find test/functional -maxdepth 1 \
                               -type f \
                               -name '*.py' \
                               ! -executable \
                               -exec printf "%s is not executable\n" {} \; \
                               -exec false {} +
      - name: Flake8 checks
        run: |
          flake8 test
  
  autotools:
    needs: python_checks
    strategy:
      matrix:
        org_repo: [nchain/svn_dev]
        tag: [ubuntu_24.04, debian_12, centos_10]
        toolset: [gcc]
    runs-on: arc-runner-svnode
    container:
      image: "${{ matrix.org_repo }}:${{ matrix.tag }}"
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: ''
      - name: Benchmark
        uses: ./.github/actions/benchmark/ 
      - name: Build
        uses: ./.github/actions/build_bitcoin_autotools
      - name: Unit test
        uses: ./.github/actions/unit_test_bitcoin_autotools
      - name: Functional test
        uses: ./.github/actions/functional_test
        with: 
          tag: ${{ matrix.tag }}
          toolset: ${{ matrix.toolset }}

  cmake:
    needs: python_checks
    strategy:
      matrix:
        org_repo: [nchain/svn_dev]
        tag : [ubuntu_24.04]
        toolset: [clang]
        version: [ 21 ]
        build_type: [ Release, Debug ]
        include:
          - build_type: Debug
            options: cov
          - build_type: Release
            options: asan usan
    runs-on: arc-runner-svnode
    container:
      image: "${{ matrix.org_repo }}:${{ matrix.tag }}"
    timeout-minutes: 120 
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: ''
      - name: Benchmark
        uses: ./.github/actions/benchmark/ 
      - name: Select toolset version
        uses: ./.github/actions/select_toolset_version
        with: 
          toolset: ${{ matrix.toolset }}
          version: ${{ matrix.version }}
      - name: Build Bitcoin
        uses: ./.github/actions/build_bitcoin_cmake
        with: 
          toolset: ${{ matrix.toolset }}
          build_type: ${{ matrix.build_type }}
          options: ${{ matrix.options }}
      - name: Unit test secp256k1
        uses: ./.github/actions/unit_test_secp256k1_cmake
      - name: Unit test Bitcoin
        uses: ./.github/actions/unit_test_bitcoin_cmake
      - name: Generate unit test coverage lcov
        if: ${{ matrix.build_type == 'Debug' && matrix.options == 'cov' }}
        run: contrib/coverage_lcov.sh -t ${{ matrix.toolset }} src/test/test_bitcoin
      - name: Generate unit test coverage report
        if: ${{ matrix.build_type == 'Debug' && matrix.options == 'cov' }}
        run: contrib/coverage_html.sh -o src/test/test_bitcoin_cov -n "test_bitcoin" coverage.lcov
      - name: Set now environment variable
        if: ${{ matrix.build_type == 'Debug' && matrix.options == 'cov' }}
        run: |
          echo "now=$(date +'%Y-%m-%dT%H-%M-%S')" >> $GITHUB_ENV
        shell: bash
      - name: Upload test_bitcoin coverage
        if: ${{ matrix.build_type == 'Debug' && matrix.options == 'cov' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: test_bitcoin_cov-${{ env.now }}
          path: ./src/test/test_bitcoin_cov
      - name: Bench test Bitcoin
        uses: ./.github/actions/bench_test_bitcoin_cmake
      - name: Functional test
        if: ${{ matrix.build_type != 'Debug' }}
        uses: ./.github/actions/functional_test
        with: 
          tag: ${{ matrix.tag }}
          toolset: ${{ matrix.toolset }}

