name: Weeknight IBD

on:
  schedule:
    - cron: '59 23 * * MON-FRI'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  weeknight_ibd:
    runs-on: [ self-hosted, docker, large, perf ]
    container:
      image: nchain/svn_dev:ubuntu_22.04
      options: --cap-add SYS_ADMIN --volume /lib/modules:/lib/modules
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: ''
      - name: Build Bitcoin
        uses: ./.github/workflows/build_bitcoin_cmake
        with: 
          build_type: Release
      - name: Initial Block Download
        uses: ./.github/workflows/ibd
        with:
          duration: $((5 * 60 * 60)) # Note: Each job must be < 6hrs
