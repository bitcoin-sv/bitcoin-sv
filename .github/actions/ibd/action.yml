name: 'Initial Block Download'
description:  'Initial Block Download Performance'
inputs:
  duration:
    description: Duration in seconds 
    required: true
  restore:
    description: restore ~/.bitcoin/ from cache
    required: true
  save:
    description: save ~/.bitcoin/ to cache
    required: true
runs:
  using: "composite"
  steps:
    - name: Install Perf
      run: |
        apt-get update
        if ! apt-get install -y linux-tools-$(uname -r) linux-headers-$(uname -r); then
          # Host kernel may be from a different Ubuntu release than the container.
          # Map kernel version to the Ubuntu codename that provides it.
          case "$(uname -r)" in
            5.4.*)  codename=focal  ;;
            5.15.*) codename=jammy  ;;
            6.5.*)  codename=mantic ;;
            6.8.*)  codename=noble  ;;
            *)      echo "Unknown kernel $(uname -r), cannot determine source repo"; exit 1 ;;
          esac
          echo "deb http://archive.ubuntu.com/ubuntu ${codename} main universe" \
            > /etc/apt/sources.list.d/${codename}-kernel-tools.list
          echo "deb http://archive.ubuntu.com/ubuntu ${codename}-updates main universe" \
            >> /etc/apt/sources.list.d/${codename}-kernel-tools.list
          apt-get update
          apt-get install -y linux-tools-$(uname -r) linux-headers-$(uname -r)
        fi
      shell: bash
    - name: Configure bitcoind
      run: |
        mkdir ~/.bitcoin
        cp .github/docker/cargo/bitcoin.conf ~/.bitcoin/
      shell: bash
    - name: restore cache
      if: inputs.restore == 'true'
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
       key: ibd-
       restore-keys: |
        ibd-
       path: |
         ~/.bitcoin/
         !~/.bitcoin/.lock
    - name: delete restored cache
      if: inputs.restore == 'true'
      run: |
        gh cache delete --all -R ${{ github.repository }}
      shell: bash
    - name: Set begin height environment variable
      run: |
        if [[ -f ~/.bitcoin/bitcoind.log ]];
        then
          echo "begin_height=$(<~/.bitcoin/bitcoind.log .github/actions/ibd/block_height)" \
          >> $GITHUB_ENV
        else
          echo "begin_height=0" >> $GITHUB_ENV
        fi
      shell: bash
    - name: Run bitcoind
      run: |
        ./src/bitcoind -assumevalid=0 &
      shell: bash
    - name: Run Perf
      run: |
        perf record -g \
                    -F 99 \
                    -p $(pidof bitcoind) \
                    -o tmp.dat \
                    -- sleep ${{ inputs.duration }}
      shell: bash
    - name: Stop Bitcoind
      run: |
        ./src/bitcoin-cli stop
        while pidof -q bitcoind;
        do
          echo "waiting for bitcoind to stop"
          sleep 1
        done
      shell: bash
    - name: Set end height environment variable
      run: |
        echo "end_height=$(<~/.bitcoin/bitcoind.log .github/actions/ibd/block_height)" \
        >> $GITHUB_ENV
      shell: bash
    - name: Set now environment variable
      run: |
        echo "now=$(date +'%Y-%m-%dT%H-%M-%S')" >> $GITHUB_ENV
      shell: bash
    - name: Set prefix environment variable
      run: |
        echo "prefix=ibd-${now}-${{ inputs.duration }}s-${begin_height}-${end_height}" >> $GITHUB_ENV
      shell: bash
    - name: Upload bitcoind files
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
       name: ${{ env.prefix }}-.bitcoin
       path: |
          ~/.bitcoin/bitcoin.conf
          ~/.bitcoin/bitcoind.log
    - name: Produce flamegraph
      run: |
        perf script -i tmp.dat \
        | /FlameGraph/stackcollapse-perf.pl \
        | /FlameGraph/flamegraph.pl \
            --title "IBD - Block Height ${{ env.begin_height }} to ${{ env.end_height }}" \
            --subtitle "(${{ env.now }}, duration: ${{ inputs.duration }} seconds)" \
        > ${{ env.prefix }}-flamegraph.svg
      shell: bash
    - name: Upload flamegraph
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
       name: ${{ env.prefix }}-flamegraph.svg
       path: ${{ env.prefix }}-flamegraph.svg
    - name: cache save
      if: inputs.save == 'true'
      uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
       path: |
         ~/.bitcoin/
         !~/.bitcoin/.lock
       key: ${{ env.prefix }}


